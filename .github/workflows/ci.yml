name: CI

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up mise
        uses: jdx/mise-action@v2

      - name: Install tools and dependencies
        run: |
          mise install
          bun install --frozen-lockfile

      - name: Run checks
        run: mise run check
