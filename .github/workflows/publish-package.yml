name: Release packages

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: npm dist-tag to publish under
        required: true
        default: latest
        type: string
      dry_run:
        description: Run the release pipeline without pushing, tagging, creating GitHub releases, or publishing for real
        required: true
        default: false
        type: boolean

jobs:
  release:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    concurrency:
      group: release-main
      cancel-in-progress: false
    env:
      NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
      DIST_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || 'latest' }}
      DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'false' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure workflow runs from main
        run: |
          if [ "$GITHUB_REF_NAME" != "main" ]; then
            echo "This release workflow must be run from the main branch." >&2
            exit 1
          fi

      - name: Set up mise
        uses: jdx/mise-action@v2

      - name: Install tools and dependencies
        run: |
          mise install
          bun install --frozen-lockfile

      - name: Validate workspace before release
        run: bun run check

      - name: Build release plan
        run: bun scripts/release-plan.ts > release-plan.json

      - name: Summarize release plan
        id: plan
        run: |
          COUNT=$(bun -e 'const plan = await Bun.file("release-plan.json").json(); console.log(plan.length)')
          echo "count=${COUNT}" >> "$GITHUB_OUTPUT"
          echo "summary<<EOF" >> "$GITHUB_OUTPUT"
          bun -e 'const plan = await Bun.file("release-plan.json").json(); if (plan.length === 0) { console.log("No package releases required."); } else { for (const item of plan) { console.log(item.packageName + " -> " + item.releaseType); } }'
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "## Release plan" >> "$GITHUB_STEP_SUMMARY"
          bun -e 'const plan = await Bun.file("release-plan.json").json(); if (plan.length === 0) { console.log("- No package releases required."); } else { for (const item of plan) { console.log("- " + item.packageName + ": " + item.releaseType); } }' >> "$GITHUB_STEP_SUMMARY"

      - name: Stop when there is nothing to release
        if: steps.plan.outputs.count == '0'
        run: echo "No changed packages since the last package tags."

      - name: Configure git author
        if: steps.plan.outputs.count != '0' && env.DRY_RUN != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Configure npm authentication
        if: steps.plan.outputs.count != '0'
        run: |
          test -n "$NPM_CONFIG_TOKEN"
          printf "//registry.npmjs.org/:_authToken=%s\n" "$NPM_CONFIG_TOKEN" > ~/.npmrc

      - name: Release changed packages
        if: steps.plan.outputs.count != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          bun -e "const plan = await Bun.file('release-plan.json').json(); for (const item of plan) { console.log(Buffer.from(JSON.stringify(item)).toString('base64')); }" > release-plan-lines.txt

          while IFS= read -r encoded; do
            [ -n "$encoded" ] || continue

            ITEM_JSON=$(printf '%s' "$encoded" | base64 --decode)
            PACKAGE_DIR=$(bun -e "const item = JSON.parse(process.argv[1]); console.log(item.packageDir)" "$ITEM_JSON")
            RELEASE_TYPE=$(bun -e "const item = JSON.parse(process.argv[1]); console.log(item.releaseType)" "$ITEM_JSON")

            echo "Processing ${PACKAGE_DIR} (${RELEASE_TYPE})"

            BUMP_OUTPUT=$(bun scripts/release-package.ts "$PACKAGE_DIR" "$RELEASE_TYPE")

            PACKAGE_BASENAME=''
            PACKAGE_NAME=''
            OLD_VERSION=''
            VERSION=''
            TAG=''
            RELEASE_NAME=''

            while IFS='=' read -r key value; do
              case "$key" in
                package_basename) PACKAGE_BASENAME="$value" ;;
                name) PACKAGE_NAME="$value" ;;
                old_version) OLD_VERSION="$value" ;;
                version) VERSION="$value" ;;
                tag) TAG="$value" ;;
                release_name) RELEASE_NAME="$value" ;;
              esac
            done <<< "$BUMP_OUTPUT"

            bun install
            bun run check

            if git rev-parse "$TAG" >/dev/null 2>&1; then
              echo "Tag already exists locally: $TAG" >&2
              exit 1
            fi

            if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
              echo "Tag already exists on origin: $TAG" >&2
              exit 1
            fi

            if bunx npm view "$PACKAGE_NAME@$VERSION" version >/dev/null 2>&1; then
              echo "Version already exists on npm: $PACKAGE_NAME@$VERSION" >&2
              exit 1
            fi

            git add "$PACKAGE_DIR/package.json" bun.lock

            if [ "$DRY_RUN" = "true" ]; then
              echo "[dry-run] Would commit release($PACKAGE_BASENAME): $VERSION"
            else
              git commit -m "release($PACKAGE_BASENAME): $VERSION [skip ci]"
              git tag "$TAG"
            fi

            echo "Publishing $PACKAGE_NAME@$VERSION from $PACKAGE_DIR"
            PUBLISH_ARGS=(publish --access public --tag "$DIST_TAG" --provenance)
            if [ "$DRY_RUN" = "true" ]; then
              PUBLISH_ARGS+=(--dry-run)
            fi
            (
              cd "$PACKAGE_DIR"
              bunx npm "${PUBLISH_ARGS[@]}"
            )

            if [ "$DRY_RUN" != "true" ]; then
              git push origin HEAD:main
              git push origin "$TAG"
              gh release create "$TAG" \
                --title "$RELEASE_NAME" \
                --generate-notes
            fi

            {
              echo "### $PACKAGE_NAME@$VERSION"
              echo
              echo "- package: $PACKAGE_DIR"
              echo "- bump: $RELEASE_TYPE"
              echo "- previous version: $OLD_VERSION"
              echo "- new version: $VERSION"
              echo "- tag: $TAG"
              echo "- dist-tag: $DIST_TAG"
              if [ "$DRY_RUN" = "true" ]; then
                echo "- mode: dry-run"
              else
                echo "- mode: released"
              fi
              echo
            } >> "$GITHUB_STEP_SUMMARY"
          done < release-plan-lines.txt
