[tools]
bun = "1.3.12"

[env]
_.path = [
  "{{config_root}}/node_modules/.bin",
]

[tasks.install]
description = "Install workspace dependencies with Bun"
run = "bun install"

[tasks.format]
description = "Format and apply safe fixes with Biome"
run = "bun run format"

[tasks.lint]
description = "Run Biome checks"
run = "bun run lint"

[tasks.typecheck]
description = "Type-check the workspace"
run = "bun run typecheck"

[tasks.test]
description = "Run package tests with Bun"
run = "bun run test"

[tasks.check]
description = "Run lint, typecheck, and tests"
run = "bun run check"
